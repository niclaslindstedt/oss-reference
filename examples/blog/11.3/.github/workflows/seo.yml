name: seo

# Builds the site and runs the SEO regression check. Catches the failure
# modes that took #99 / #100 / #101 to fix — empty SSR body, missing <h1>,
# noindex slipped onto a real page, canonical drift, broken JSON-LD,
# `?view=blog` leaks in static HTML, dropped sitemap entries, and the
# critical-path JS budget. Errors block the PR; warnings (e.g. long meta
# descriptions) surface as annotations but don't fail the run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install website deps
        working-directory: website
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Build
        working-directory: website
        run: npm run build
      - name: Check SEO surfaces
        working-directory: website
        run: npm run check:seo
