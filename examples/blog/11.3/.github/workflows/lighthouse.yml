name: lighthouse

# Real Lighthouse runs against the built site, with thresholds enforced via
# `.github/lighthouse/lighthouserc.json`. Catches the Core Web Vitals (LCP,
# INP, CLS) regressions that the static `check-seo` workflow can't see —
# byte counts don't tell you how long the page actually takes to become
# interactive on a throttled emulated mobile device, but Lighthouse does.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install website deps
        working-directory: website
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Build
        working-directory: website
        run: npm run build
      - name: Install Lighthouse CI
        run: npm install --global @lhci/cli@0.14.x
      - name: Run Lighthouse
        run: lhci autorun --config=./.github/lighthouse/lighthouserc.json
